name: plataforma-kaqchikel

services:
  postgres:
    image: postgres:18.4-alpine3.23
    container_name: kaqchikel-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - data_net

volumes:
  postgres_data:
    name: kaqchikel_postgres_data

networks:
  data_net:
    name: kaqchikel_data_net
    driver: bridge
